<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NDRRMC Flood Command | Pototan Station</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    
    <style>
        :root {
            --ndrrmc-green: #4caf50;
            --ndrrmc-yellow: #ffeb3b;
            --ndrrmc-orange: #ff9800;
            --ndrrmc-red: #f44336;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0c; color: #fff; min-height: 100vh; }
        
        .header { background: #121214; border-bottom: 4px solid var(--ndrrmc-red); padding: 15px 30px; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        
        .station-status-pill { padding: 5px 12px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .status-online { background: rgba(76, 175, 80, 0.2); color: var(--ndrrmc-green); border: 1px solid var(--ndrrmc-green); }
        .status-offline { background: rgba(244, 67, 54, 0.2); color: var(--ndrrmc-red); border: 1px solid var(--ndrrmc-red); }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .main-display {
            background: #18181b; border-radius: 12px; padding: 40px; text-align: center; margin-bottom: 20px;
            border: 1px solid #27272a;
            transition: all 0.3s ease;
        }

        .level-number { font-size: 120px; font-weight: 800; margin: 10px 0; line-height: 1; transition: color 0.3s ease; }
        .warning-label { font-size: 24px; font-weight: 700; padding: 10px 25px; border-radius: 8px; display: inline-block; transition: all 0.3s ease; }
        
        .progress-container { background: #27272a; height: 16px; border-radius: 8px; margin: 30px 0; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; transition: width 0.5s ease, background-color 0.3s ease; }

        .log-section { background: #18181b; border-radius: 12px; padding: 20px; border: 1px solid #27272a; }
        .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #27272a; flex-wrap: wrap; gap: 10px; }
        
        .log-list { max-height: 400px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 12px; }
        .log-item { padding: 10px 0; border-bottom: 1px solid #27272a; display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
        
        .log-btn { background: #27272a; border: none; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s; }
        .log-btn:hover { background: #3f3f46; }
        .btn-export { background: var(--ndrrmc-green); }
        .btn-export:hover { background: #3d8b40; }

        /* LOG TYPE COLORS */
        .type-tag { padding: 2px 8px; border-radius: 3px; font-size: 10px; margin-right: 10px; font-weight: bold; display: inline-block; }
        .tag-alert { background: var(--ndrrmc-red); color: white; }
        .tag-event { background: var(--ndrrmc-orange); color: #000; }
        .tag-water { background: var(--ndrrmc-yellow); color: #000; }
        .tag-normal { background: var(--ndrrmc-green); color: #000; }
        .tag-system { background: #3f3f46; color: #a1a1aa; }

        .critical-glow { box-shadow: 0 0 50px rgba(244, 67, 54, 0.25); border: 1px solid var(--ndrrmc-red); }
        .warning-glow { box-shadow: 0 0 30px rgba(255, 235, 59, 0.2); border: 1px solid var(--ndrrmc-yellow); }
        .severe-glow { box-shadow: 0 0 40px rgba(255, 152, 0, 0.25); border: 1px solid var(--ndrrmc-orange); }
        
        /* New compact date-time style */
        .log-datetime {
            color: #52525b;
            font-size: 10px;
            font-family: monospace;
            min-width: 130px;
            text-align: right;
        }
        
        @media (max-width: 768px) {
            .level-number { font-size: 70px; }
            .warning-label { font-size: 16px; }
            .header-content { justify-content: center; text-align: center; }
            .log-item { flex-direction: column; align-items: flex-start; gap: 5px; }
            .log-datetime { text-align: left; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <div style="display:flex; align-items:center; gap:15px;">
            <img src="https://alto.com.ph/src/ALTO_SIGN-header.png" 
                 alt="ALTO Logo" 
                 style="height: 45px; width: auto; display: block;"
                 onerror="this.onerror=null; this.style.display='none';">
            <div>
                <h1 style="font-size: 20px; letter-spacing: 1px;">DRM FLOOD COMMAND</h1>
                <p style="font-size: 10px; color: #71717a; font-weight:600;">POTOTAN STATION | NDRRMC PROTOCOL</p>
            </div>
        </div>
        <div id="stationPill" class="station-status-pill status-offline">Offline</div>
    </div>
</div>

<div class="container">
    <div class="main-display" id="displayCard">
        <p id="lastSeen" style="font-size: 11px; color: #71717a; font-weight:600;">AWAITING DATA...</p>
        <div class="level-number" id="levelNum">—</div>
        <div class="warning-label" id="warningLabel">INITIALIZING</div>
        <p id="instructionText" style="margin-top: 20px; color: #a1a1aa; font-size: 15px; font-weight:500;">Connecting to MQTT broker...</p>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <div class="log-section">
        <div class="log-header">
            <h3 style="font-size: 14px; color: #fff;"><i class="fas fa-history"></i> INCIDENT LOG</h3>
            <div style="display:flex; gap:10px; flex-wrap: wrap;">
                <button class="log-btn btn-export" onclick="exportToCSV()"><i class="fas fa-download"></i> EXPORT</button>
                <button class="log-btn" onclick="clearLogs()"><i class="fas fa-trash"></i> CLEAR</button>
            </div>
        </div>
        <div class="log-list" id="logList"></div>
    </div>
</div>

<script>
    const MQTT_CONFIG = {
        host: "b01384c7f4aa43c2a7950f4fd7c8bb18.s1.eu.hivemq.cloud",
        port: 8884,
        user: "subscriber_flood",
        pass: "User1234",
        maxLogs: 2000,
        visibleLogs: 50
    };

    let watchdogTimer;
    let lastLoggedLevel = -1;
    let lastLoggedWaterState = "";
    const client = new Paho.MQTT.Client(MQTT_CONFIG.host, MQTT_CONFIG.port, "pototan_web_" + Math.random().toString(16).slice(2, 8));

    const PROTOCOLS = [
        { label: "NORMAL", color: "#4caf50", bg: "rgba(76, 175, 80, 0.15)", msg: "No flood threat detected. Water levels are within safe limits.", level: 0 },
        { label: "YELLOW (AWARENESS)", color: "#ffeb3b", bg: "rgba(255, 235, 59, 0.15)", msg: "Low-lying areas should monitor river levels. Flooding is possible.", level: 1 },
        { label: "ORANGE (PREPAREDNESS)", color: "#ff9800", bg: "rgba(255, 152, 0, 0.15)", msg: "Flooding is threatening. Communities are advised to prepare for evacuation.", level: 2 },
        { label: "RED (EMERGENCY)", color: "#f44336", bg: "rgba(244, 67, 54, 0.15)", msg: "SEVERE FLOODING. Evacuate immediately to designated centers!", level: 3 }
    ];

    // Helper function to format date and time
    function formatDateTime(timestamp) {
        const d = new Date(timestamp);
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const year = d.getFullYear();
        const hours = String(d.getHours()).padStart(2, '0');
        const minutes = String(d.getMinutes()).padStart(2, '0');
        const seconds = String(d.getSeconds()).padStart(2, '0');
        return `${month}/${day}/${year} ${hours}:${minutes}:${seconds}`;
    }

    // Helper to format just time for compact display (date in separate column)
    function formatTime(timestamp) {
        const d = new Date(timestamp);
        const hours = String(d.getHours()).padStart(2, '0');
        const minutes = String(d.getMinutes()).padStart(2, '0');
        const seconds = String(d.getSeconds()).padStart(2, '0');
        return `${hours}:${minutes}:${seconds}`;
    }

    function resetWatchdog() {
        clearTimeout(watchdogTimer);
        document.getElementById("stationPill").innerText = "Online";
        document.getElementById("stationPill").className = "station-status-pill status-online";
        
        watchdogTimer = setTimeout(() => {
            document.getElementById("stationPill").innerText = "Offline";
            document.getElementById("stationPill").className = "station-status-pill status-offline";
            addLog("⚠️ SIGNAL LOST - Station offline", "tag-system");
        }, 35000);
    }

    function updateUI(level) {
        const data = PROTOCOLS[level] || PROTOCOLS[0];
        const card = document.getElementById("displayCard");
        
        const levelNum = document.getElementById("levelNum");
        levelNum.innerText = level;
        levelNum.style.color = data.color;
        
        const label = document.getElementById("warningLabel");
        label.innerText = data.label;
        label.style.background = level === 1 ? "#1a1a1a" : data.color;
        label.style.color = level === 1 ? data.color : (level === 0 ? "#000" : "#fff");
        label.style.border = level === 1 ? `1px solid ${data.color}` : "none";
        
        document.getElementById("instructionText").innerText = data.msg;
        document.getElementById("lastSeen").innerHTML = "LAST UPDATE: " + formatDateTime(Date.now());
        
        const bar = document.getElementById("progressBar");
        const percentage = (level / 3) * 100;
        bar.style.width = percentage + "%";
        bar.style.backgroundColor = data.color;
        
        card.classList.remove("critical-glow", "warning-glow", "severe-glow");
        if (level === 1) card.classList.add("warning-glow");
        else if (level === 2) card.classList.add("severe-glow");
        else if (level === 3) card.classList.add("critical-glow");
        
        card.style.background = `linear-gradient(135deg, #18181b, ${data.bg})`;
    }

    function addLog(msg, tagClass) {
        const list = document.getElementById("logList");
        const now = Date.now();
        const logEntry = { timestamp: now, message: msg, type: tagClass };

        let history = JSON.parse(localStorage.getItem("flood_history") || "[]");
        history.unshift(logEntry);
        if (history.length > MQTT_CONFIG.maxLogs) history.pop();
        localStorage.setItem("flood_history", JSON.stringify(history));

        const item = document.createElement("div");
        item.className = "log-item";
        
        let typeLabel = "";
        let typeTagClass = tagClass;
        
        if (tagClass === 'tag-alert') typeLabel = '🔴 CRITICAL';
        else if (tagClass === 'tag-event') typeLabel = '🟠 LEVEL CHANGE';
        else if (tagClass === 'tag-water') typeLabel = '💧 WATER DETECTED';
        else if (tagClass === 'tag-normal') typeLabel = '🟢 NORMAL';
        else typeLabel = '⚙️ SYSTEM';
        
        item.innerHTML = `
            <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex: 1;">
                <span class="type-tag ${typeTagClass}">${typeLabel}</span>
                <span>${msg}</span>
            </div>
            <div class="log-datetime">${formatDateTime(now)}</div>
        `;
        list.insertBefore(item, list.firstChild);
        if (list.children.length > MQTT_CONFIG.visibleLogs) list.removeChild(list.lastChild);
    }

    function exportToCSV() {
        const history = JSON.parse(localStorage.getItem("flood_history") || "[]");
        if (!history.length) return alert("No logs to export.");

        let csv = "Date,Time,Type,Message\n";
        // Reverse to show oldest first in CSV
        [...history].reverse().forEach(log => {
            const d = new Date(log.timestamp);
            const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            const timeStr = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
            let type = "SYSTEM";
            if (log.type === 'tag-alert') type = "CRITICAL";
            else if (log.type === 'tag-event') type = "LEVEL CHANGE";
            else if (log.type === 'tag-water') type = "WATER DETECTED";
            else if (log.type === 'tag-normal') type = "NORMAL";
            
            const cleanMsg = log.message.replace(/,/g, ";");
            csv += `${dateStr},${timeStr},${type},${cleanMsg}\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Pototan_Flood_Report_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        window.URL.revokeObjectURL(url);
        addLog("📁 Data exported to CSV", "tag-system");
    }

    function clearLogs() {
        if(confirm("Delete all stored logs?")) {
            localStorage.removeItem("flood_history");
            document.getElementById("logList").innerHTML = "";
            addLog("Logs cleared by administrator", "tag-system");
        }
    }

    function loadSavedHistory() {
        const savedHistory = JSON.parse(localStorage.getItem("flood_history") || "[]");
        if (savedHistory.length > 0) {
            savedHistory.slice(0, MQTT_CONFIG.visibleLogs).forEach(log => {
                const item = document.createElement("div");
                item.className = "log-item";
                
                let typeLabel = "";
                let typeTagClass = log.type;
                
                if (log.type === 'tag-alert') typeLabel = '🔴 CRITICAL';
                else if (log.type === 'tag-event') typeLabel = '🟠 LEVEL CHANGE';
                else if (log.type === 'tag-water') typeLabel = '💧 WATER DETECTED';
                else if (log.type === 'tag-normal') typeLabel = '🟢 NORMAL';
                else typeLabel = '⚙️ SYSTEM';
                
                item.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex: 1;">
                        <span class="type-tag ${typeTagClass}">${typeLabel}</span>
                        <span>${log.message}</span>
                    </div>
                    <div class="log-datetime">${formatDateTime(log.timestamp)}</div>
                `;
                document.getElementById("logList").appendChild(item);
            });
        }
    }

    // MQTT Connection
    client.onMessageArrived = (msg) => {
        resetWatchdog();
        
        try {
            const data = JSON.parse(msg.payloadString);
            const level = data.level !== undefined ? data.level : 0;
            
            updateUI(level);
            
            // Heartbeat: No log entry
            if (data.heartbeat) {
                return;
            }
            
            // Check for water detection
            const activeSensors = [];
            if (data.sensor1 === 1) activeSensors.push("Low");
            if (data.sensor2 === 1) activeSensors.push("Mid");
            if (data.sensor3 === 1) activeSensors.push("High");
            
            const waterState = activeSensors.join("/");
            const levelNames = ["NORMAL", "WARNING", "SEVERE", "CRITICAL"];
            
            // Evacuation order (highest priority)
            if (data.evacuate === true) {
                addLog(`🚨 EVACUATION ORDER - Level ${level} (${levelNames[level]})`, "tag-alert");
                lastLoggedWaterState = waterState;
                lastLoggedLevel = level;
                return;
            }
            
            // Water detected event
            if (activeSensors.length > 0 && waterState !== lastLoggedWaterState) {
                addLog(`💧 WATER DETECTED - ${waterState} level | Flood Level ${level} (${levelNames[level]})`, "tag-water");
                lastLoggedWaterState = waterState;
                lastLoggedLevel = level;
                return;
            }
            
            // Level change event
            if (level !== lastLoggedLevel && lastLoggedLevel !== -1) {
                if (level === 0) {
                    addLog(`✅ BACK TO NORMAL - All clear (Level ${level})`, "tag-normal");
                } else {
                    addLog(`📊 LEVEL CHANGE - ${levelNames[level]} (Level ${level})`, "tag-event");
                }
                lastLoggedLevel = level;
                return;
            }
            
            // First time seeing data
            if (lastLoggedLevel === -1) {
                addLog(`📡 INITIAL STATUS - ${levelNames[level]} (Level ${level})`, "tag-normal");
                lastLoggedLevel = level;
                lastLoggedWaterState = waterState;
            }
            
        } catch (e) {
            // Handle plain text alerts
            if (msg.destinationName.includes("alert")) {
                const lvl = parseInt(msg.payloadString);
                if (!isNaN(lvl) && lvl !== lastLoggedLevel) {
                    updateUI(lvl);
                    const levelNames = ["NORMAL", "WARNING", "SEVERE", "CRITICAL"];
                    if (lvl === 0) {
                        addLog(`✅ BACK TO NORMAL - All clear`, "tag-normal");
                    } else {
                        addLog(`🚨 ALERT - ${levelNames[lvl]} (Level ${lvl})`, "tag-alert");
                    }
                    lastLoggedLevel = lvl;
                }
            }
        }
    };

    client.onConnectionLost = (err) => {
        addLog("🔌 CONNECTION LOST - Reconnecting...", "tag-system");
        setTimeout(connect, 5000);
    };

    function connect() {
        client.connect({
            userName: MQTT_CONFIG.user,
            password: MQTT_CONFIG.pass,
            useSSL: true,
            mqttVersion: 4,
            onSuccess: () => {
                client.subscribe("flood/#");
                addLog("✅ MQTT CONNECTED", "tag-system");
                resetWatchdog();
            },
            onFailure: (err) => {
                setTimeout(connect, 5000);
            }
        });
    }

    loadSavedHistory();
    connect();
    
    setTimeout(() => {
        if (document.getElementById("logList").children.length === 0) {
            addLog("🟢 Station monitoring active", "tag-system");
        }
    }, 1000);
</script>

</body>
</html>
