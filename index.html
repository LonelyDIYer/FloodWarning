<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NDRRMC Flood Command | Pototan Station</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    
    <style>
        :root {
            --ndrrmc-yellow: #ffeb3b;
            --ndrrmc-orange: #ff9800;
            --ndrrmc-red: #f44336;
            --ndrrmc-green: #4caf50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0c; color: #fff; min-height: 100vh; }
        
        .header { background: #121214; border-bottom: 4px solid var(--ndrrmc-red); padding: 15px 30px; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        
        .station-status-pill { padding: 5px 12px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        .status-online { background: rgba(76, 175, 80, 0.2); color: var(--ndrrmc-green); border: 1px solid var(--ndrrmc-green); }
        .status-offline { background: rgba(244, 67, 54, 0.2); color: var(--ndrrmc-red); border: 1px solid var(--ndrrmc-red); }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .main-display {
            background: #18181b; border-radius: 12px; padding: 40px; text-align: center; margin-bottom: 20px; transition: 0.5s;
            border: 1px solid #27272a;
        }

        .level-number { font-size: 120px; font-weight: 800; margin: 10px 0; line-height: 1; }
        .warning-label { font-size: 24px; font-weight: 700; padding: 10px 25px; border-radius: 8px; display: inline-block; }
        
        .progress-container { background: #27272a; height: 16px; border-radius: 8px; margin: 30px 0; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }

        .log-section { background: #18181b; border-radius: 12px; padding: 20px; border: 1px solid #27272a; }
        .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #27272a; }
        
        .log-list { max-height: 400px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 12px; }
        .log-item { padding: 10px 0; border-bottom: 1px solid #27272a; display: flex; justify-content: space-between; }
        
        .log-btn { background: #27272a; border: none; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s; }
        .log-btn:hover { background: #3f3f46; }
        .btn-export { background: var(--ndrrmc-green); }
        .btn-export:hover { background: #3d8b40; }

        .type-tag { padding: 2px 6px; border-radius: 3px; font-size: 10px; margin-right: 10px; font-weight: bold; }
        .tag-alert { background: var(--ndrrmc-red); color: white; }
        .tag-health { background: #3f3f46; color: #a1a1aa; }

        .critical-glow { box-shadow: 0 0 50px rgba(244, 67, 54, 0.25); border: 1px solid var(--ndrrmc-red); }
    </style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <div style="display:flex; align-items:center; gap:15px;">
            <i class="fas fa-shield-alt" style="color:var(--ndrrmc-red); font-size: 28px;"></i>
            <div>
                <h1 style="font-size: 20px; letter-spacing: 1px;">DRM FLOOD COMMAND</h1>
                <p style="font-size: 10px; color: #71717a; font-weight:600;">POTOTAN STATION | NDRRMC PROTOCOL</p>
            </div>
        </div>
        <div id="stationPill" class="station-status-pill status-offline">Station Offline</div>
    </div>
</div>

<div class="container">
    <div class="main-display" id="displayCard">
        <p id="lastSeen" style="font-size: 11px; color: #71717a; font-weight:600;">AWAITING TELEMETRY...</p>
        <div class="level-number" id="levelNum">—</div>
        <div class="warning-label" id="warningLabel">INITIALIZING</div>
        <p id="instructionText" style="margin-top: 20px; color: #a1a1aa; font-size: 15px; font-weight:500;">Connecting to encrypted MQTT broker...</p>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <div class="log-section">
        <div class="log-header">
            <h3 style="font-size: 14px; color: #fff;">STATION HISTORY (MAX 2,000)</h3>
            <div style="display:flex; gap:10px;">
                <button class="log-btn btn-export" onclick="exportToCSV()"><i class="fas fa-download"></i> EXPORT CSV</button>
                <button class="log-btn" onclick="clearLogs()"><i class="fas fa-trash"></i> CLEAR</button>
            </div>
        </div>
        <div class="log-list" id="logList"></div>
    </div>
</div>

<script>
    const MQTT_CONFIG = {
        host: "b01384c7f4aa43c2a7950f4fd7c8bb18.s1.eu.hivemq.cloud",
        port: 8884,
        user: "subscriber_flood",
        pass: "User1234",
        maxLogs: 2000,
        visibleLogs: 50
    };

    let watchdogTimer;
    const client = new Paho.MQTT.Client(MQTT_CONFIG.host, MQTT_CONFIG.port, "pototan_web_" + Math.random().toString(16).slice(2, 8));

    const PROTOCOLS = [
        { label: "NORMAL", color: "#4caf50", msg: "No flood threat detected. Water levels are within safe limits.", level: 0 },
        { label: "YELLOW (AWARENESS)", color: "#ffeb3b", msg: "Low-lying areas should monitor river levels. Flooding is possible.", level: 1 },
        { label: "ORANGE (PREPAREDNESS)", color: "#ff9800", msg: "Flooding is threatening. Communities are advised to prepare for evacuation.", level: 2 },
        { label: "RED (EMERGENCY)", color: "#f44336", msg: "SEVERE FLOODING. Evacuate immediately to designated centers!", level: 3 }
    ];

    // --- Core Logic ---

    function resetWatchdog() {
        clearTimeout(watchdogTimer);
        document.getElementById("stationPill").innerText = "Station Online";
        document.getElementById("stationPill").className = "station-status-pill status-online";
        
        // Timeout if no signal for 35 seconds
        watchdogTimer = setTimeout(() => {
            document.getElementById("stationPill").innerText = "Station Offline / Down";
            document.getElementById("stationPill").className = "station-status-pill status-offline";
            addLog("STATION SIGNAL LOST - Device may be powered down", "tag-alert");
        }, 35000);
    }

    function updateUI(level) {
        const data = PROTOCOLS[level] || PROTOCOLS[0];
        const card = document.getElementById("displayCard");
        
        document.getElementById("levelNum").innerText = level;
        document.getElementById("levelNum").style.color = data.color;
        
        const label = document.getElementById("warningLabel");
        label.innerText = data.label;
        label.style.background = level == 1 ? "#000" : data.color;
        label.style.color = level == 1 ? data.color : "#000";
        
        document.getElementById("instructionText").innerText = data.msg;
        document.getElementById("lastSeen").innerText = "LAST TELEMETRY: " + new Date().toLocaleTimeString();
        
        const bar = document.getElementById("progressBar");
        bar.style.width = (level / 3 * 100) + "%";
        bar.style.backgroundColor = data.color;
        
        if (level >= 2) card.classList.add("critical-glow");
        else card.classList.remove("critical-glow");
    }

    function addLog(msg, tagClass) {
        const list = document.getElementById("logList");
        const logEntry = { timestamp: Date.now(), message: msg, type: tagClass };

        // Save to LocalStorage
        let history = JSON.parse(localStorage.getItem("flood_history") || "[]");
        history.unshift(logEntry);
        if (history.length > MQTT_CONFIG.maxLogs) history.pop();
        localStorage.setItem("flood_history", JSON.stringify(history));

        // UI Update
        const item = document.createElement("div");
        item.className = "log-item";
        item.innerHTML = `
            <span><span class="type-tag ${tagClass}">${tagClass === 'tag-alert' ? 'ALERT' : 'HEALTH'}</span> ${msg}</span>
            <span style="color:#52525b">${new Date().toLocaleTimeString()}</span>
        `;
        list.insertBefore(item, list.firstChild);
        if (list.children.length > MQTT_CONFIG.visibleLogs) list.removeChild(list.lastChild);
    }

    function exportToCSV() {
        const history = JSON.parse(localStorage.getItem("flood_history") || "[]");
        if (!history.length) return alert("No logs to export.");

        let csv = "Timestamp,Date,Time,Type,Message\n";
        history.forEach(log => {
            const d = new Date(log.timestamp);
            const type = log.type === 'tag-alert' ? "ALERT" : "HEALTH";
            csv += `${log.timestamp},${d.toLocaleDateString()},${d.toLocaleTimeString()},${type},${log.message.replace(/,/g, ";")}\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Pototan_Flood_Report_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        addLog("Data history exported to CSV file", "tag-health");
    }

    function clearLogs() {
        if(confirm("Permanently delete all stored logs?")) {
            localStorage.removeItem("flood_history");
            document.getElementById("logList").innerHTML = "";
            addLog("System logs cleared by administrator", "tag-health");
        }
    }

    // --- MQTT Connection ---

    client.onMessageArrived = (msg) => {
        resetWatchdog();
        try {
            const data = JSON.parse(msg.payloadString);
            const level = data.level !== undefined ? data.level : 0;
            updateUI(level);

            if (data.heartbeat) {
                addLog(`Health Check: Lvl ${level} | RSSI: ${data.rssi}dBm | Uptime: ${data.uptime}m`, "tag-health");
            } else {
                addLog(`CRITICAL: Inbound Alert - Level ${level}`, "tag-alert");
            }
        } catch (e) {
            if (msg.destinationName.includes("alert")) {
                const lvl = parseInt(msg.payloadString);
                updateUI(lvl);
                addLog(`Manual Override Alert: Level ${lvl}`, "tag-alert");
            }
        }
    };

    client.onConnectionLost = () => {
        addLog("LINK INTERRUPTED - Retrying connection...", "tag-alert");
        setTimeout(connect, 5000);
    };

    function connect() {
        client.connect({
            userName: MQTT_CONFIG.user,
            password: MQTT_CONFIG.pass,
            useSSL: true,
            mqttVersion: 4,
            onSuccess: () => {
                client.subscribe("flood/#");
                addLog("MQTT BROKER LINK ESTABLISHED", "tag-health");
            },
            onFailure: () => setTimeout(connect, 5000)
        });
    }

    // Initialize
    const savedHistory = JSON.parse(localStorage.getItem("flood_history") || "[]");
    if(savedHistory.length) updateUI(savedHistory[0].message.includes("Level 3") ? 3 : 0); // Simplified last state
    connect();
</script>

</body>
</html>
